# Netlify konfigurasjon for tradinglab.no

# Tving HTTPS – sender alle HTTP-besøkende videre til HTTPS
[[redirects]]
  from = "http://tradinglab.no/*"
  to = "https://tradinglab.no/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.tradinglab.no/*"
  to = "https://tradinglab.no/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.tradinglab.no/*"
  to = "https://tradinglab.no/:splat"
  status = 301
  force = true

# Sikkerhetsheadere for alle sider
[[headers]]
  for = "/*"
  [headers.values]
    # Hindrer siden fra å bli lastet i iframe (clickjacking-beskyttelse)
    X-Frame-Options = "DENY"

    # Hindrer nettleseren fra å gjette filtype (MIME-sniffing)
    X-Content-Type-Options = "nosniff"

    # Begrenser hvilken info som sendes til andre nettsteder
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Tvinger HTTPS i 1 år fremover
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

    # Slår av unødvendige nettleserfunksjoner
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

    # Innholdssikkerhetspolicy – tillater kun ressurser fra eget domene
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' data:; font-src 'self'"
